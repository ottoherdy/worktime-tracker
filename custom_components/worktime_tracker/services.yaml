set_lunch:
  name: Set lunch status
  description: Mark whether lunch was taken today.
  fields:
    had_lunch:
      name: Had lunch
      description: "True = lunch taken (full workday), False = no lunch (-30 min)"
      required: false
      default: true
      example: true
      selector:
        boolean:

log_arrival:
  name: Log arrival
  description: Manually register arrival at work right now.

log_departure:
  name: Log departure
  description: Manually register departure from work right now.

reset_today:
  name: Reset today
  description: Clear today's registrations and start over.

export_history:
  name: Export today to Sheets
  description: Re-send today's row to the configured Google Sheets.

edit_day:
  name: Edit day
  description: Edit arrival, departure or lunch for any date. Set type to Sick to log a sick day.
  fields:
    date:
      name: Date
      description: The date to edit. Leave empty for today.
      required: false
      selector:
        date:
    type:
      name: Type
      description: Normal workday or sick day. Leave empty to keep existing type.
      required: false
      selector:
        select:
          options:
            - "normal"
            - "sick"
    arrival:
      name: Arrival
      description: Arrival time (ignored for sick days).
      required: false
      selector:
        time:
    departure:
      name: Departure
      description: Departure time (ignored for sick days).
      required: false
      selector:
        time:
    lunch:
      name: Lunch
      description: Did you have lunch? (ignored for sick days).
      required: false
      selector:
        select:
          options:
            - "yes"
            - "no"
    hours:
      name: Hours (sick day)
      description: How many hours to count for a sick day. Leave empty for 8h.
      required: false
      selector:
        number:
          min: 0.5
          max: 24
          step: 0.5
          unit_of_measurement: h

log_sick_day:
  name: Log sick day
  description: Mark a day as sick leave. Sent to Sheets with Type = Sick.
  fields:
    date:
      name: Date
      description: The date to mark as sick. Leave empty for today.
      required: false
      selector:
        date:
    hours:
      name: Hours
      description: How many hours to count. Leave empty for a full workday.
      required: false
      selector:
        number:
          min: 0.5
          max: 24
          step: 0.5
          unit_of_measurement: h

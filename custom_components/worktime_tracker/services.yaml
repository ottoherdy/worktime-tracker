set_lunch:
  name: Set lunch status
  description: Mark whether lunch was taken today.
  fields:
    had_lunch:
      name: Had lunch
      description: "True = lunch taken, False = no lunch (no deduction)"
      required: false
      default: true
      example: true
      selector:
        boolean:

log_arrival:
  name: Log arrival
  description: Manually register arrival at work right now.

log_departure:
  name: Log departure
  description: Manually register departure from work right now.

reset_today:
  name: Reset today
  description: Clear today's registrations and start over.

export_today:
  name: Export today to Sheets
  description: Re-send today's row to the configured Google Sheets worksheet.

export_all:
  name: Export all to Sheets
  description: >
    Walk every locally-known day and append any rows that are missing
    from Sheets, or that have changed since they were last pushed.
    Changed rows are appended with the next Rev number so you can see
    which version is the current one. Optional — requires the Google
    Sheets integration to be configured for this entry.
  fields:
    since:
      name: Since
      description: Only export days on or after this date (YYYY-MM-DD). Leave empty for all.
      required: false
      selector:
        text:
    force:
      name: Force re-export
      description: >
        Re-send every day even if its fingerprint matches the last push.
        Useful if you cleared the Sheets tab manually and want everything
        back.
      required: false
      default: false
      selector:
        boolean:
    entry_prefix:
      name: Entry prefix
      description: For multi-instance setups — restrict to this instance.
      required: false
      selector:
        text:

edit_day:
  name: Edit day
  description: >
    Edit arrival, departure or lunch for any date.
    Set type to "sick" to log a sick day (counts net workday hours).
    Set type to "off" to log a day off / vacation (counts 0 hours).
  fields:
    date:
      name: Date
      description: The date to edit. Leave empty for today.
      required: false
      selector:
        date:
    type:
      name: Type
      description: Normal workday, sick day, or day off. Leave empty to keep existing type.
      required: false
      selector:
        select:
          options:
            - "normal"
            - "sick"
            - "off"
    arrival:
      name: Arrival
      description: Arrival time HH:MM (only for normal days).
      required: false
      selector:
        time:
    departure:
      name: Departure
      description: Departure time HH:MM (only for normal days).
      required: false
      selector:
        time:
    lunch:
      name: Lunch
      description: Did you have lunch? (only for normal days).
      required: false
      selector:
        select:
          options:
            - "yes"
            - "no"
    hours:
      name: Hours
      description: >
        Override hours counted. For sick days defaults to net workday hours,
        for off days defaults to 0. Leave empty to use the default.
      required: false
      selector:
        number:
          min: 0
          max: 24
          step: 0.5
          unit_of_measurement: h

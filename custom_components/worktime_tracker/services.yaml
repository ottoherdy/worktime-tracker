set_lunch:
  name: Set lunch status
  description: Mark whether lunch was taken today.
  fields:
    had_lunch:
      name: Had lunch
      description: "True = lunch taken (full workday), False = no lunch (-30 min)"
      required: false
      default: true
      example: true
      selector:
        boolean:

log_arrival:
  name: Log arrival
  description: Manually register arrival at work right now.

log_departure:
  name: Log departure
  description: Manually register departure from work right now.

reset_today:
  name: Reset today
  description: Clear today's registrations and start over.

export_history:
  name: Export today to Sheets
  description: Re-send today's row to the configured Google Sheets.

edit_day:
  name: Edit day
  description: Edit arrival, departure or lunch for any date.
  fields:
    date:
      name: Date
      description: The date to edit. Leave empty for today.
      required: false
      selector:
        date:
    arrival:
      name: Arrival
      description: Arrival time
      required: false
      selector:
        time:
    departure:
      name: Departure
      description: Departure time
      required: false
      selector:
        time:
    lunch:
      name: Lunch
      description: Did you have lunch? Leave unchecked to keep as unknown.
      required: false
      selector:
        select:
          options:
            - "yes"
            - "no"

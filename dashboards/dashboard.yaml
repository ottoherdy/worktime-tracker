title: Work
path: work2
type: sections
max_columns: 1
dense_section_placement: true
theme: Graphite Auto
background:
  opacity: 0
  alignment: top center
  size: cover
  repeat: no-repeat
  attachment: scroll
header:
  layout: center
  badges_position: top
badges:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    layout_options:
      grid_columns: 4
      grid_rows: 1
    alignment: center
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:view-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /lovelace
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:tablet-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /dashboard-workroom
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:auto-mode
    color: ""
    entity: input_boolean.kioskmode
    tap_action:
      action: toggle
cards: []
icon: mdi:briefcase
sections:

  # --- Today ---
  - type: grid
    cards:
      - type: heading
        heading_style: subtitle
        icon: mdi:briefcase-clock
        badges:
          - type: entity
            entity: sensor.today_status
          - type: entity
            entity: sensor.today_hours_today
        heading: Today
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_hours_today
        icon: mdi:login
        name: Arrival
        card_layout: small
        show_state: false
        show_attribute: true
        attribute: arrival
        modules:
          - "!default"
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_hours_today
        icon: mdi:logout
        name: Departure
        card_layout: small
        show_state: false
        show_attribute: true
        attribute: departure
        modules:
          - "!default"
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_hours_today
        icon: mdi:timer-sand
        name: Time left
        card_layout: small
        show_state: false
        show_attribute: true
        attribute: time_remaining
        modules:
          - "!default"
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_hours_today
        icon: mdi:food
        name: Lunch
        card_layout: small
        show_state: false
        show_attribute: true
        attribute: lunch
        modules:
          - "!default"
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: more-info
        sub_button:
          main: []
          bottom: []
        show_icon: true
        show_name: true

  # --- Work time ---
  - type: grid
    cards:
      - type: heading
        heading: Work time
        heading_style: subtitle
        icon: mdi:briefcase-clock
        badges: []
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: This week
              show_name: true
              icon: mdi:calendar-week
              scrolling_effect: false
              state_background: true
              show_background: true
            - entity: sensor.this_week_hours_this_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: hours
              show_background: true
              state_background: false
            - entity: sensor.this_week_hours_this_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
              show_background: true
              state_background: false
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
        hide_main_background: true
        card_layout: normal
        styles: |
          .bubble-sub-button-container {
            padding: 0px 1px;
            gap: 1px;
          }
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: Last week
              show_name: true
              icon: mdi:calendar-week
              scrolling_effect: false
              state_background: true
              show_background: true
            - entity: sensor.last_week_hours_last_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: hours
              show_background: true
              state_background: false
            - entity: sensor.last_week_hours_last_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
              show_background: true
              state_background: false
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
        hide_main_background: true
        card_layout: normal
        styles: |
          .bubble-sub-button-container {
            padding: 0px 1px;
            gap: 1px;
          }
      - type: custom:flex-table-card
        entities:
          include: sensor.this_week_hours_this_week
        columns:
          - name: ""
            attr_as_list: days
            modify: '"" + x.weekday'
          - name: ""
            attr_as_list: days
            modify: 'x.arrival !== "—" ? x.arrival + "–" + x.departure : "—"'
          - name: ""
            attr_as_list: days
            modify: '"" + x.human_readable'
        css:
          thead+: "display: none;"
          td+: "padding: 2px 4px; font-size: 0.85em;"
          table+: "width: 100%; table-layout: fixed;"
          td:nth-child(1)+: "width: 20%; text-align: left;"
          td:nth-child(2)+: "width: 40%; text-align: left;"
          td:nth-child(3)+: "width: 30%; text-align: left;"
        grid_options:
          columns: 6
          rows: auto
      - type: custom:flex-table-card
        entities:
          include: sensor.last_week_hours_last_week
        columns:
          - name: ""
            attr_as_list: days
            modify: '"" + x.weekday'
          - name: ""
            attr_as_list: days
            modify: 'x.arrival !== "—" ? x.arrival + "–" + x.departure : "—"'
          - name: ""
            attr_as_list: days
            modify: '"" + x.human_readable'
        css:
          thead+: "display: none;"
          td+: "padding: 2px 4px; font-size: 0.85em;"
          table+: "width: 100%; table-layout: fixed;"
          td:nth-child(1)+: "width: 20%;"
          td:nth-child(2)+: "width: 40%;"
          td:nth-child(3)+: "width: 30%;"
        grid_options:
          columns: 6
          rows: auto
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: This month
              show_name: true
              icon: mdi:calendar-month
              scrolling_effect: false
              state_background: true
              show_background: true
            - entity: sensor.this_month_hours_this_month
              show_name: false
              show_state: false
              show_attribute: true
              attribute: hours
              show_background: true
              state_background: false
            - entity: sensor.this_month_hours_this_month
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
              show_background: true
              state_background: false
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
        hide_main_background: true
        card_layout: normal
        styles: |
          .bubble-sub-button-container {
            padding: 0px 1px;
            gap: 1px;
          }
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: Last month
              show_name: true
              icon: mdi:calendar-month
              scrolling_effect: false
              state_background: true
              show_background: true
            - entity: sensor.last_month_hours_last_month
              show_name: false
              show_state: false
              show_attribute: true
              attribute: hours
              show_background: true
              state_background: false
            - entity: sensor.last_month_hours_last_month
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
              show_background: true
              state_background: false
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
        hide_main_background: true
        card_layout: normal
        styles: |
          .bubble-sub-button-container {
            padding: 0px 1px;
            gap: 1px;
          }

  # --- Quick actions ---
  - type: grid
    cards:
      - type: heading
        heading: Quick actions
        heading_style: subtitle
        icon: mdi:lightning-bolt
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:login
        name: Log arrival
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_arrival
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:food
        name: Lunch — Yes
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: true
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: script.edit_worktime_day
        icon: mdi:calendar-edit
        name: Edit day
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:logout
        name: Log departure
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_departure
        icon_action:
          action: more-info
        hold_action:
          action: more-info
        scrolling_effect: false
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:food-off
        name: Lunch — No
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: false
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:restart
        name: Reset today
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.reset_today
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:google-spreadsheet
        name: Send to Sheets
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.export_today
        icon_action:
          action: more-info
        hold_action:
          action: more-info
        scrolling_effect: false
      - type: custom:bubble-card
        card_type: button
        entity: person.your_person
        icon: mdi:alpha-o-circle-outline
        name: ""
        card_layout: small
        show_state: false
        show_attribute: true
        attribute: time_remaining
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        button_type: state
        sub_button:
          main: []
          bottom: []
        show_icon: true
        force_icon: false
      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: switch.today_auto_departure
        icon: mdi:clock-out
        name: Auto departure
        card_layout: small
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: toggle
        hold_action:
          action: more-info

  # --- History ---
  - type: grid
    cards:
      - type: heading
        heading: History
        heading_style: subtitle
        icon: mdi:history
        badges: []
      - type: custom:flex-table-card
        entities:
          include: sensor.today_hours_today
        columns:
          - name: Date
            attr_as_list: recent_days
            modify: x.date
          - name: Day
            attr_as_list: recent_days
            modify: x.weekday
          - name: In–Out
            attr_as_list: recent_days
            modify: 'x.arrival !== "—" ? x.arrival + "–" + x.departure : (x.type === "sick" ? "Sick" : "—")'
          - name: Time
            attr_as_list: recent_days
            modify: x.human_readable
          - name: ""
            attr_as_list: recent_days
            modify: 'x.punch_out_missing ? "⚠" : (x.type === "sick" ? "🤒" : "")'
        css:
          thead+: "font-size: 0.75em; opacity: 0.6;"
          td+: "padding: 2px 4px; font-size: 0.82em;"
          table+: "width: 100%; table-layout: fixed;"
          td:nth-child(1)+: "width: 22%; text-align: left;"
          td:nth-child(2)+: "width: 10%; text-align: left;"
          td:nth-child(3)+: "width: 35%; text-align: left;"
          td:nth-child(4)+: "width: 25%; text-align: left;"
          td:nth-child(5)+: "width: 8%; text-align: center;"
        grid_options:
          columns: 6
          rows: auto

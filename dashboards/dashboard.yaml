title: Work
path: work
type: sections
max_columns: 1
dense_section_placement: true
theme: Graphite Auto
background:
  opacity: 0
  alignment: top center
  size: cover
  repeat: no-repeat
  attachment: scroll
header:
  layout: center
  badges_position: top
badges:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    layout_options:
      grid_columns: 4
      grid_rows: 1
    alignment: center
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:view-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /lovelace
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:tablet-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /dashboard-workroom
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:auto-mode
    color: ""
    entity: input_boolean.kioskmode
    tap_action:
      action: toggle
cards: []
icon: mdi:briefcase
sections:

  # --- Work time ---
  - type: grid
    cards:
      - type: heading
        heading: Work time
        heading_style: title
        icon: mdi:briefcase-clock
        badges:
          - type: entity
            entity: sensor.today_status
          - type: entity
            entity: sensor.today_hours_today
      - type: custom:bubble-card
        card_type: button
        entity: sensor.today_hours_today
        icon: mdi:login
        name: Arrival
        card_layout: large
        show_state: false
        show_attribute: true
        attribute: arrival
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.today_hours_today
        icon: mdi:logout
        name: Departure
        card_layout: large
        show_state: false
        show_attribute: true
        attribute: departure
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.today_hours_today
        icon: mdi:timer-sand
        name: Time left
        card_layout: large
        show_state: false
        show_attribute: true
        attribute: time_remaining
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:mushroom-template-card
        primary: Lunch
        secondary: >-
          {% set l = state_attr('sensor.today_hours_today', 'lunch') %}
          {{ 'Ate lunch' if l == 'yes' else 'No lunch' if l == 'no' else '' }}
        icon: >-
          {% set l = state_attr('sensor.today_hours_today', 'lunch') %}
          {{ 'mdi:check-circle' if l == 'yes' else 'mdi:close-circle' if l == 'no' else 'mdi:help-circle' }}
        icon_color: >-
          {% set l = state_attr('sensor.today_hours_today', 'lunch') %}
          {{ 'green' if l == 'yes' else 'red' if l == 'no' else 'grey' }}
        layout: horizontal
        fill_container: false
        entity: sensor.today_hours_today
        tap_action:
          action: more-info
        grid_options:
          columns: 4
          rows: 1
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: script.edit_worktime_day
        icon: mdi:calendar-edit
        name: Edit day
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: person.ottoherdy
        icon: mdi:alpha-o-circle-outline
        name: ""
        card_layout: large
        show_state: false
        show_attribute: true
        attribute: time_remaining
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        button_type: state
        sub_button:
          main: []
          bottom: []
        show_icon: true
        force_icon: false

  # --- Quick actions ---
  - type: grid
    cards:
      - type: heading
        heading: Quick actions
        heading_style: title
        icon: mdi:lightning-bolt
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:login
        name: Log arrival
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_arrival
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:food
        name: Lunch — Yes
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: true
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:google-spreadsheet
        name: Send to Sheets
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.export_history
        icon_action:
          action: more-info
        hold_action:
          action: more-info
        scrolling_effect: false
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:logout
        name: Log departure
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_departure
        icon_action:
          action: more-info
        hold_action:
          action: more-info
        scrolling_effect: false
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:food-off
        name: Lunch — No
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: false
        icon_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        button_type: button
        entity: sensor.today_status
        icon: mdi:restart
        name: Reset today
        card_layout: large
        show_state: false
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.reset_today
        icon_action:
          action: more-info
        hold_action:
          action: more-info

  # --- This week / Last week side by side ---
  - type: grid
    cards:
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: This week
              show_name: true
              icon: mdi:calendar-week
            - entity: sensor.this_week_hours_this_week
              show_name: false
              show_state: true
            - entity: sensor.this_week_hours_this_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
      - type: custom:bubble-card
        card_type: sub-buttons
        sub_button:
          main: []
          bottom:
            - name: Last week
              show_name: true
              icon: mdi:calendar-week-begin
            - entity: sensor.last_week_hours_last_week
              show_name: false
              show_state: true
            - entity: sensor.last_week_hours_last_week
              show_name: false
              show_state: false
              show_attribute: true
              attribute: overtime
              icon: mdi:clock-plus-outline
        rows: 0.938
        grid_options:
          columns: 6
          rows: auto
      - type: markdown
        content: >-
          {% set days = state_attr('sensor.this_week_hours_this_week', 'days') or [] %}
          {% for d in days %}
          `{{ d.weekday.ljust(7) }}`{% if d.arrival != '—' %}{{ d.arrival }}–{{ d.departure }} · {% endif %}{{ d.human_readable }}

          {% endfor %}
        grid_options:
          columns: 6
          rows: auto
      - type: markdown
        content: >-
          {% set days = state_attr('sensor.last_week_hours_last_week', 'days') or [] %}
          {% for d in days %}
          `{{ d.weekday.ljust(7) }}`{% if d.arrival != '—' %}{{ d.arrival }}–{{ d.departure }} · {% endif %}{{ d.human_readable }}

          {% endfor %}
        grid_options:
          columns: 6
          rows: auto

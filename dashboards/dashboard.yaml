title: electricity
path: template
type: sections
max_columns: 2
dense_section_placement: true
theme: Graphite Auto
background:
  opacity: 68
  alignment: top center
  size: cover
  repeat: no-repeat
  attachment: scroll
  image: /api/image/serve/1074a51e82fd0bd0ca22fc937c966a52/original
header:
  layout: center
  badges_position: top
badges:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    layout_options:
      grid_columns: 4
      grid_rows: 1
    alignment: center
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:view-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /lovelace
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:tablet-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /dashboard-workroom
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:auto-mode
    color: ""
    entity: input_boolean.kioskmode
    tap_action:
      action: toggle
cards: []
icon: mdi:alpha-t-box
sections:

  # --- Status ---
  - type: grid
    cards:
      - type: heading
        heading: Work time
        heading_style: title
        icon: mdi:briefcase-clock
        badges:
          - type: entity
            entity: sensor.worktime_tracker_status
          - type: entity
            entity: sensor.worktime_tracker_hours_today
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_arrival_time
        icon: mdi:login
        name: Arrival
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_departure_time
        icon: mdi:logout
        name: Departure
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_time_remaining
        icon: mdi:timer-sand
        name: Time remaining
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_lunch_status
        icon: mdi:food
        name: Lunch
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info

  # --- Quick actions ---
  - type: grid
    cards:
      - type: heading
        heading: Quick actions
        heading_style: title
        icon: mdi:lightning-bolt
      - type: custom:bubble-card
        card_type: button
        icon: mdi:login
        name: Log arrival
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_arrival
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        icon: mdi:logout
        name: Log departure
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.log_departure
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        icon: mdi:food
        name: Lunch — Yes
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: true
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        icon: mdi:food-off
        name: Lunch — No
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: false
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        icon: mdi:google-spreadsheet
        name: Send to Sheets
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.export_history
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        icon: mdi:restart
        name: Reset today
        card_layout: large
        show_state: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        tap_action:
          action: call-service
          service: worktime_tracker.reset_today
        hold_action:
          action: more-info

  # --- This week ---
  - type: grid
    cards:
      - type: heading
        heading: This week
        heading_style: title
        icon: mdi:calendar-week
        badges:
          - type: entity
            entity: sensor.worktime_tracker_hours_week
          - type: entity
            entity: sensor.worktime_tracker_overtime_week
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_monday
        icon: mdi:calendar-today
        name: Monday
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_tuesday
        icon: mdi:calendar-today
        name: Tuesday
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_wednesday
        icon: mdi:calendar-today
        name: Wednesday
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_thursday
        icon: mdi:calendar-today
        name: Thursday
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info
      - type: custom:bubble-card
        card_type: button
        entity: sensor.worktime_tracker_friday
        icon: mdi:calendar-today
        name: Friday
        card_layout: large
        show_state: true
        show_attribute: false
        sub_button: []
        modules:
          - "!default"
        grid_options:
          columns: 4
          rows: 1
        double_tap_action:
          action: more-info
        hold_action:
          action: more-info

  # --- Chart ---
  - type: grid
    cards:
      - type: heading
        heading: This week vs last week
        heading_style: title
        icon: mdi:chart-bar
      - type: custom:apexcharts-card
        header:
          show: false
        chart_type: bar
        apex_config:
          chart:
            height: 280
          plotOptions:
            bar:
              columnWidth: 60%
              borderRadius: 4
          xaxis:
            type: category
            categories:
              - Mon
              - Tue
              - Wed
              - Thu
              - Fri
          yaxis:
            min: 0
            max: 12
          stroke:
            width: [0, 0, 2]
            dashArray: [0, 0, 6]
          legend:
            position: top
          dataLabels:
            enabled: true
            formatter: |
              EVAL:function(val) { return val ? val.toFixed(1) + 'h' : ''; }
        series:
          - entity: sensor.worktime_tracker_hours_week
            name: This week
            type: column
            color: "#3B82F6"
            data_generator: |
              const days = entity.attributes.this_week || [];
              return days.map(d => ({ x: d.weekday, y: d.hours }));
          - entity: sensor.worktime_tracker_hours_week
            name: Last week
            type: column
            color: "#9CA3AF"
            data_generator: |
              const days = entity.attributes.last_week || [];
              return days.map(d => ({ x: d.weekday, y: d.hours }));
          - entity: sensor.worktime_tracker_hours_week
            name: 8h target
            type: line
            color: "#F97316"
            stroke_width: 2
            data_generator: |
              return [{x:'Mon',y:8},{x:'Tue',y:8},{x:'Wed',y:8},{x:'Thu',y:8},{x:'Fri',y:8}];

title: electricity
path: template
type: sections
max_columns: 2
dense_section_placement: true
theme: Graphite Auto
background:
  opacity: 68
  alignment: top center
  size: cover
  repeat: no-repeat
  attachment: scroll
  image: /api/image/serve/1074a51e82fd0bd0ca22fc937c966a52/original
header:
  layout: center
  badges_position: top
badges:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
    layout_options:
      grid_columns: 4
      grid_rows: 1
    alignment: center
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:view-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /lovelace
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:tablet-dashboard
    color: ""
    tap_action:
      action: navigate
      navigation_path: /dashboard-workroom
  - type: custom:mushroom-template-badge
    content: ""
    icon: mdi:auto-mode
    color: ""
    entity: input_boolean.kioskmode
    tap_action:
      action: toggle
cards: []
icon: mdi:alpha-t-box
sections:

  # --- Status ---
  - type: grid
    cards:
      - type: heading
        heading: Work time
        heading_style: title
        icon: mdi:briefcase-clock
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_status
        name: Status
        icon: mdi:account-clock
        tap_action:
          action: more-info
        layout_options:
          grid_columns: 1
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: binary_sensor.worktime_tracker_at_work
        name: At work
        icon: mdi:office-building
        layout_options:
          grid_columns: 1
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_lunch_status
        name: Lunch
        icon: mdi:food
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: true
        layout_options:
          grid_columns: 1
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_hours_today
        name: Hours today
        icon: mdi:clock-outline
        layout_options:
          grid_columns: 1
          grid_rows: 1

  # --- Dagens tider ---
  - type: grid
    cards:
      - type: heading
        heading: Today
        heading_style: title
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_arrival_time
        name: Arrival
        icon: mdi:login
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_planned_end_time
        name: Planned end
        icon: mdi:flag-checkered
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_departure_time
        name: Departure
        icon: mdi:logout
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_time_remaining
        name: Time remaining (min)
        icon: mdi:timer-sand
        layout_options:
          grid_columns: 2
          grid_rows: 1

  # --- Vecka + senaste dagarna ---
  - type: grid
    cards:
      - type: heading
        heading: This week
        heading_style: title
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_hours_week
        name: Hours
        icon: mdi:calendar-week
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: custom:mushroom-entity-card
        entity: sensor.worktime_tracker_overtime_week
        name: Overtime
        icon: mdi:clock-plus-outline
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: markdown
        title: Recent days
        content: >
          {% set days = state_attr('sensor.worktime_tracker_hours_week', 'recent_days') or [] %}
          | Dag | Datum | Timmar |
          |-----|-------|--------|
          {% for d in days | reverse %}
          | **{{ d.weekday }}** | {{ d.date }} | {{ d.hours }}h |
          {% endfor %}
        layout_options:
          grid_columns: 4
          grid_rows: 3

  # --- Veckodiagram ---
  - type: grid
    cards:
      - type: heading
        heading: This week vs last week
        heading_style: title
      - type: custom:apexcharts-card
        header:
          show: false
        chart_type: bar
        apex_config:
          chart:
            height: 280
          plotOptions:
            bar:
              columnWidth: 60%
              borderRadius: 4
          xaxis:
            type: category
            categories:
              - Mån
              - Tis
              - Ons
              - Tor
              - Fre
          yaxis:
            min: 0
            max: 12
          stroke:
            width: [0, 0, 2]
            dashArray: [0, 0, 6]
          legend:
            position: top
          dataLabels:
            enabled: true
            formatter: |
              EVAL:function(val) { return val ? val.toFixed(1) + 'h' : ''; }
        series:
          - entity: sensor.worktime_tracker_hours_week
            name: This week
            type: column
            color: "#3B82F6"
            data_generator: |
              const days = entity.attributes.this_week || [];
              return days.map(d => ({ x: d.weekday, y: d.hours }));
          - entity: sensor.worktime_tracker_hours_week
            name: Last week
            type: column
            color: "#9CA3AF"
            data_generator: |
              const days = entity.attributes.last_week || [];
              return days.map(d => ({ x: d.weekday, y: d.hours }));
          - entity: sensor.worktime_tracker_hours_week
            name: 8h-mål
            type: line
            color: "#F97316"
            stroke_width: 2
            data_generator: |
              return [{x:'Mån',y:8},{x:'Tis',y:8},{x:'Ons',y:8},{x:'Tor',y:8},{x:'Fre',y:8}];

  # --- Snabbåtgärder ---
  - type: grid
    cards:
      - type: heading
        heading: Quick actions
        heading_style: title
      - type: button
        name: Log arrival
        icon: mdi:login
        tap_action:
          action: call-service
          service: worktime_tracker.log_arrival
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: button
        name: Log departure
        icon: mdi:logout
        tap_action:
          action: call-service
          service: worktime_tracker.log_departure
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: button
        name: Lunch — Yes
        icon: mdi:food
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: true
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: button
        name: Lunch — No
        icon: mdi:food-off
        tap_action:
          action: call-service
          service: worktime_tracker.set_lunch
          service_data:
            had_lunch: false
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: button
        name: Send to Sheets
        icon: mdi:google-spreadsheet
        tap_action:
          action: call-service
          service: worktime_tracker.export_history
        layout_options:
          grid_columns: 2
          grid_rows: 1
      - type: button
        name: Reset today
        icon: mdi:restart
        tap_action:
          action: call-service
          service: worktime_tracker.reset_today
        layout_options:
          grid_columns: 2
          grid_rows: 1

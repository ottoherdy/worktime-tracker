alias: Log Sick Day
icon: mdi:medical-bag
fields:
  date:
    name: Date
    description: Which date to mark as sick. Leave empty for today.
    required: false
    selector:
      date:
  hours:
    name: Hours
    description: How many hours to count. Leave empty for a full workday.
    required: false
    selector:
      number:
        min: 0.5
        max: 24
        step: 0.5
        unit_of_measurement: h
sequence:
  - action: worktime_tracker.log_sick_day
    data:
      date: "{{ date | default('') }}"
      hours: "{{ hours | default('') }}"
